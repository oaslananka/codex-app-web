name: Security-safe public report
description: Report security hardening work that does not expose sensitive details.
title: 'security: '
labels: ['type:security', 'area:security', 'priority:P1', 'risk:high']
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for public, non-sensitive security work. If the report includes exploit details, secrets, private logs, or undisclosed vulnerability details, stop and use a private GitHub Security Advisory instead.
  - type: textarea
    id: summary
    attributes:
      label: Safe summary
      description: Describe the hardening gap without exploit details or secrets.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What could go wrong if this remains unfixed?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Safe checks or evidence maintainers can use.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This report contains no exploit steps, secrets, credentials, private prompts, or private logs.
          required: true
