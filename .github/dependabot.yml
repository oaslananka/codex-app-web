version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:17'
      timezone: Etc/UTC
    open-pull-requests-limit: 4
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: build(deps)
    groups:
      runtime-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - next
          - react
          - react-dom
          - fastify
          - '@fastify/*'
          - ws
          - dompurify
          - marked
          - highlight.js
          - '@highlightjs/*'
      test-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - vitest
          - '@vitest/*'
          - playwright
          - happy-dom
      tooling-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - typescript
          - '@types/*'
          - prettier
          - tailwindcss
          - '@tailwindcss/*'
          - postcss
          - autoprefixer
          - cross-env

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:37'
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci(deps)
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - '*'
